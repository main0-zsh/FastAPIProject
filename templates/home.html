<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #051805;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border-left: 5px solid #4a8c2b;
        }

        h2 {
            text-align: center;
            color: #000000;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Добро пожаловать в сайт отзывов!</h2>
        <p>Здесь вы можете оставить свой отзыв о нашем сервисе. Ваше мнение очень важно для нас, и мы стремимся сделать все возможное, чтобы улучшить наш сервис на основе ваших отзывов.</p>
        <button onclick="location.href='/send'">Отправить отзыв</button>
    </div>
</body>
</html>
